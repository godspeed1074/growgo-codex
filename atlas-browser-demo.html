<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Browser Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      background: #eef5fb;
      color: #163046;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #eef5fb 0%, #d6e7f7 100%);
    }

    .atlas-demo-shell {
      width: min(960px, calc(100vw - 32px));
      padding: 24px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(22, 48, 70, 0.12);
      box-shadow: 0 18px 50px rgba(10, 34, 52, 0.12);
    }

    .atlas-demo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .atlas-demo-header h1 {
      margin: 0;
      font-size: 28px;
    }

    .atlas-demo-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .atlas-demo-controls button {
      border: 1px solid #163046;
      background: #163046;
      color: #ffffff;
      padding: 12px 16px;
      font: inherit;
      cursor: pointer;
    }

    .atlas-demo-controls button:last-child {
      background: #ffffff;
      color: #163046;
    }

    .atlas-demo-status {
      margin: 0 0 16px;
      min-height: 24px;
      font-size: 14px;
    }

    .atlas-preview-container {
      border: 1px solid rgba(22, 48, 70, 0.18);
      background: #f8fbfe;
      padding: 12px;
    }

    .atlas-preview-container[hidden] {
      display: none;
    }

    .atlas-preview-canvas-host {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .atlas-preview-canvas {
      width: min(100%, 960px);
      height: auto;
      display: block;
      border: 1px solid rgba(22, 48, 70, 0.12);
      background: #d7ecff;
    }
  </style>
</head>
<body>
  <main class="atlas-demo-shell">
    <header class="atlas-demo-header">
      <h1>Atlas Placeholder Preview</h1>
      <span>Manual-only browser demo</span>
    </header>

    <div class="atlas-demo-controls">
      <button id="atlasPreviewShowButton" type="button">Show Atlas Preview</button>
      <button id="atlasPreviewHideButton" type="button">Hide/Close Preview</button>
    </div>

    <p id="atlasPreviewStatus" class="atlas-demo-status" aria-live="polite">
      Atlas preview loading...
    </p>

    <section
      id="atlasPreviewContainer"
      class="atlas-preview-container"
      data-preview-visible="false"
      hidden
    >
      <div id="atlasPreviewCanvasHost" class="atlas-preview-canvas-host"></div>
    </section>
  </main>

  <script type="module">
    import { createAtlasBrowserDemoHarness } from "./client/atlas-browser-demo-harness.mjs";

    const harness = createAtlasBrowserDemoHarness();
    if (!harness.ok) {
      const status = document.getElementById("atlasPreviewStatus");
      if (status) {
        status.textContent = harness.message;
      }
      throw new Error(harness.message);
    }

    window.atlasBrowserDemoHarness = harness.atlasBrowserDemoHarness;
  </script>
</body>
</html>
